<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>스위스 사는 스미스씨</title>
<style>
  :root{
    --red:#d52b1e;        /* 스위스 레드 */
    --red-dark:#a81f16;
    --ink:#1f2733;
    --paper:#f7f5f0;
    --paper2:#efe9df;
    --line:#d9d3c7;
    --gold:#e0a63a;
    --ok:#2e8b57;
    --card:#fffdf8;
    --shadow:0 4px 14px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--paper);color:var(--ink);
    display:flex;flex-direction:column;min-height:100%;
    overscroll-behavior:none;
  }
  button{font-family:inherit;cursor:pointer;border:none;}
  .hidden{display:none !important;}

  /* ---------- 공통 화면 래퍼 ---------- */
  .screen{flex:1;display:flex;flex-direction:column;padding:16px;max-width:1100px;margin:0 auto;width:100%;}

  /* ---------- 홈 ---------- */
  .home{align-items:center;justify-content:center;gap:8px;text-align:center;}
  .brand{margin-top:10px;}
  .brand .kr{font-size:34px;font-weight:800;letter-spacing:-1px;}
  .brand .en{font-size:14px;color:#8a8474;font-style:italic;margin-top:2px;}
  .brand .cross{display:inline-block;background:var(--red);color:#fff;border-radius:8px;padding:2px 9px;margin-right:8px;font-weight:900;}
  .tag{color:#8a8474;font-size:13px;margin:4px 0 18px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);width:100%;max-width:460px;text-align:left;}
  .panel h3{margin:0 0 12px;font-size:15px;}
  .plabel{font-size:13px;color:#736d5e;margin:14px 0 6px;font-weight:700;}
  .count-row{display:flex;gap:8px;flex-wrap:wrap;}
  .count-row button{flex:1;min-width:44px;padding:12px 0;border-radius:10px;border:2px solid var(--line);background:#fff;font-size:17px;font-weight:700;color:var(--ink);}
  .count-row button.sel{border-color:var(--red);background:#fff2f0;color:var(--red);}
  .stepper{display:flex;align-items:center;justify-content:center;gap:16px;}
  .stepper button{width:48px;height:48px;border-radius:50%;border:2px solid var(--line);background:#fff;font-size:24px;font-weight:800;color:var(--red);display:flex;align-items:center;justify-content:center;}
  .stepper button:active{background:#fff2f0;}
  .stepper b{font-size:30px;font-weight:800;min-width:44px;text-align:center;}
  .seatprev{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:8px;}
  .scEdge{display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:wrap;min-height:28px;}
  .scMid{display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:74px;}
  .scLeft,.scRight{flex-direction:column;width:56px;min-height:64px;}
  .scTable{flex:1;text-align:center;font-size:24px;opacity:.45;}
  .scChip{border:2px solid var(--line);border-radius:9px;padding:4px 8px;font-size:12px;font-weight:800;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:#fff;}
  .scChip.e-top{transform:rotate(180deg);}
  .scChip.e-left{transform:rotate(90deg);}
  .scChip.e-right{transform:rotate(-90deg);}
  .name-in{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;margin-bottom:8px;background:#fff;}
  .btn{display:block;width:100%;padding:15px;border-radius:12px;font-size:17px;font-weight:800;}
  .btn-primary{background:var(--red);color:#fff;box-shadow:var(--shadow);}
  .btn-primary:active{background:var(--red-dark);}
  .btn-ghost{background:transparent;color:var(--red);border:2px solid var(--red);}
  .btn-sub{background:var(--paper2);color:var(--ink);}
  .mt{margin-top:12px;}
  .link{background:none;color:#8a8474;text-decoration:underline;font-size:13px;padding:8px;}

  /* ---------- 단어 편집 ---------- */
  .editor textarea{width:100%;height:52vh;padding:12px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;line-height:1.7;background:#fff;resize:none;}
  .editor .cnt{font-size:13px;color:#8a8474;margin:8px 0;}

  /* ---------- 게임 헤더 ---------- */
  .gtop{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:6px;}
  .deckbox{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;box-shadow:var(--shadow);}
  .deck-mini{width:34px;height:46px;border-radius:6px;background:repeating-linear-gradient(45deg,#ece4d6,#ece4d6 4px,#e3d9c6 4px,#e3d9c6 8px);border:1px solid #cfc6b3;position:relative;}
  .deck-mini::after{content:"";position:absolute;inset:0;border-radius:6px;box-shadow:2px 2px 0 #d9cfbc,4px 4px 0 #cfc6b3;}
  .deck-mini .arw{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:900;color:#a89e88;font-size:16px;}
  .deckbox .lab{font-size:12px;color:#8a8474;line-height:1.3;}
  .deckbox .lab b{font-size:16px;color:var(--ink);}

  .dir{flex:1;text-align:center;background:var(--ink);color:#fff;border-radius:12px;padding:9px 8px;box-shadow:var(--shadow);}
  .dir .arw{font-size:24px;font-weight:900;line-height:1;}
  .dir .txt{font-size:12px;opacity:.85;margin-top:2px;}

  /* 턴 배너 */
  .turnbar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-left:6px solid var(--red);border-radius:12px;padding:10px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
  .turnbar .who{font-size:19px;font-weight:800;}
  .turnbar .judge{margin-left:auto;font-size:12px;color:#8a8474;text-align:right;line-height:1.3;}
  .turnbar .judge b{color:var(--ink);font-size:14px;}

  /* ---------- 보드 ---------- */
  .boardwrap{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;display:flex;align-items:center;padding:6px 2px 14px;min-height:220px;}
  .board{display:flex;gap:12px;margin:auto;padding:0 4px;}
  .board.empty{color:#a89e88;font-size:15px;margin:auto;}
  .wcard{position:relative;width:174px;height:236px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:22px 13px;text-align:center;transition:transform .12s,border-color .12s;}
  .wcard::after{content:"";position:absolute;left:14px;right:14px;top:50%;height:1px;background:var(--line);opacity:.55;}
  .wcard .word{position:relative;z-index:1;font-weight:800;line-height:1.15;width:100%;word-break:break-all;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .wcard .word.flip{transform:rotate(180deg);}
  .wcard .ord{position:absolute;top:-11px;left:-8px;width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:2;}
  .wcard .rep{position:absolute;top:-10px;right:-8px;background:var(--gold);color:#3a2a05;font-size:12px;font-weight:900;border-radius:20px;padding:3px 8px;box-shadow:var(--shadow);z-index:2;}
  .wcard .stack{position:absolute;bottom:-11px;left:6px;background:var(--ink);color:#fff;font-size:11px;font-weight:800;border-radius:12px;padding:3px 9px;box-shadow:var(--shadow);white-space:nowrap;z-index:4;border:2px solid #fff;}
  .wcard.selectable{cursor:pointer;border-color:var(--red);animation:pulse 1.1s infinite;}
  .wcard.selectable:active{transform:scale(.96);}
  .wcard.stackable{cursor:pointer;border-style:dashed;border-color:var(--red);}
  .wcard.stackable::before{content:"＋ 겹쳐놓기";position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);text-align:center;font-size:10.5px;font-weight:900;color:#fff;background:var(--red);padding:2px 0;z-index:3;}
  .wcard.stackable:active{transform:scale(.96);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(213,43,30,.4),var(--shadow);}50%{box-shadow:0 0 0 7px rgba(213,43,30,0),var(--shadow);}}
  /* 카드 놓을 자리 (점선 드롭존) */
  .dropzone{flex:0 0 auto;width:84px;height:236px;border:2.5px dashed var(--red);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--red);background:rgba(213,43,30,.05);cursor:pointer;transition:background .12s,transform .1s;}
  .dropzone:active{transform:scale(.94);background:rgba(213,43,30,.14);}
  .dropzone .plus{font-size:30px;font-weight:900;line-height:1;}
  .dropzone .zl{font-size:11px;font-weight:800;text-align:center;line-height:1.2;}
  /* 놓을 자리 번호(숫자키) 뱃지 */
  .pnum{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);min-width:24px;height:24px;padding:0 6px;border-radius:13px;background:var(--ink);color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:4;border:2px solid #fff;}
  /* 덮인 카드 = 뒤로 쌓인 카드 더미처럼 표시 */
  .wcard .under{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--card);border:1.5px solid var(--line);border-radius:16px;z-index:-1;box-shadow:var(--shadow);}
  .wcard .under.u1{transform:translate(6px,-6px);}
  .wcard .under.u2{transform:translate(11px,-11px);}
  .wcard .under.u3{transform:translate(15px,-15px);}

  /* ---------- 플레이어 트레이 ---------- */
  .players{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;-webkit-overflow-scrolling:touch;}
  .pl{flex:1 0 auto;min-width:96px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 10px;text-align:center;box-shadow:var(--shadow);}
  .pl{border-width:2px;}
  .pl.cur{box-shadow:0 0 0 4px rgba(213,43,30,.4), var(--shadow);}
  .pl.judge{box-shadow:0 0 0 4px rgba(224,166,58,.6), var(--shadow);}
  .pl .nm{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pl .role{font-size:10px;font-weight:800;margin-top:1px;height:13px;}
  .pl .role.c{color:var(--red);}
  .pl .role.j{color:var(--gold);}
  .pl .pts{font-size:11px;color:#8a8474;margin-top:4px;}
  .pl .pts b{font-size:16px;color:var(--ink);}
  .pips{display:flex;gap:2px;justify-content:center;margin-top:4px;flex-wrap:wrap;min-height:14px;}
  .pip{width:9px;height:13px;background:#c9bfa9;border:1px solid #b3a988;border-radius:2px;}
  .pip.warn{background:var(--red);border-color:var(--red-dark);}

  /* ---------- 하단 컨트롤 ---------- */
  .controls{margin-top:10px;}
  .row2{display:flex;gap:10px;}
  .row2 .btn{flex:1;}
  .btn-ok{background:var(--ok);color:#fff;box-shadow:var(--shadow);}
  .btn-fail{background:var(--red);color:#fff;box-shadow:var(--shadow);}
  .hint{text-align:center;font-size:13px;color:#8a8474;margin:2px 0 8px;line-height:1.4;}
  .hint b{color:var(--ink);}

  /* ---------- 특수카드 토스트 ---------- */
  .special-toast{position:fixed;left:50%;top:24%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:16px 22px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35);z-index:50;text-align:center;max-width:88%;animation:pop .25s;}
  @keyframes pop{from{transform:translateX(-50%) scale(.8);opacity:0;}}
  .special-toast .ico{font-size:30px;}
  .special-toast .tt{font-size:19px;font-weight:900;margin:6px 0 3px;color:var(--gold);}
  .special-toast .ds{font-size:13px;opacity:.9;line-height:1.4;}

  /* ---------- 게임오버 ---------- */
  .over{align-items:center;justify-content:center;text-align:center;gap:6px;}
  .over .cup{font-size:52px;}
  .over h2{margin:4px 0;font-size:26px;}
  .rank{width:100%;max-width:420px;margin-top:10px;}
  .rank .r{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
  .rank .r.win{border-color:var(--gold);border-width:2px;background:#fffaf0;}
  .rank .r .pos{width:26px;font-weight:900;color:#8a8474;}
  .rank .r .nm{font-weight:800;font-size:16px;flex:1;text-align:left;}
  .rank .r .sc{font-weight:800;}
  .showdown{background:#fff3f2;border:1px solid #f3c9c4;border-radius:12px;padding:14px;margin-top:8px;width:100%;max-width:420px;font-size:14px;line-height:1.5;text-align:left;}
  .showdown b{color:var(--red);}
  .footer{margin-top:auto;padding-top:10px;text-align:center;font-size:11px;color:#c3bba9;}

  /* ===== 테이블(4면 좌석) 레이아웃 ===== */
  .gtopbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .minibtn{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:12px;font-weight:800;color:var(--ink);box-shadow:var(--shadow);white-space:nowrap;}
  .minibtn:active{background:var(--paper2);}
  .gstatus{flex:1;text-align:center;font-size:13px;color:var(--ink);font-weight:700;line-height:1.3;}
  .gstatus .a{color:var(--red);font-weight:900;}
  .gstatus .rd{color:var(--red);}

  .ptable{flex:1;display:flex;flex-direction:column;min-height:0;gap:6px;}
  .edge{display:flex;align-items:center;justify-content:center;gap:8px;}
  .edge.top,.edge.bottom{flex:0 0 auto;min-height:74px;flex-wrap:wrap;}
  .mid{flex:1;display:flex;min-height:0;gap:6px;align-items:stretch;}
  .edge.left,.edge.right{flex:0 0 auto;width:132px;flex-direction:column;}
  .boardwrap{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;display:flex;align-items:center;padding:14px 2px;min-height:0;}
  .board{display:flex;gap:12px;margin:auto;padding:0 4px;align-items:center;}
  .emptyhint{color:#a89e88;font-size:14px;padding:0 16px;}

  /* 좌석 패널 — 4면 방향에 맞춰 회전 */
  .edge .pl{flex:0 0 auto;width:124px;min-width:0;padding:8px 10px;}
  .edge.top .pl{transform:rotate(180deg);}
  .edge.left .pl{transform:rotate(90deg);}
  .edge.right .pl{transform:rotate(-90deg);}
  .edge .pl .nm{font-size:13px;}
  .edge .pl .pts{font-size:10px;}

  /* 인라인 더미(카드 옆) + 방향 화살표 */
  .deckcard{flex:0 0 auto;width:108px;height:236px;border-radius:16px;border:2px solid #cfc6b3;
    background:repeating-linear-gradient(45deg,#ece4d6,#ece4d6 5px,#e3d9c6 5px,#e3d9c6 10px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-shadow:var(--shadow);position:relative;margin-right:4px;}
  .deckcard .bigarw{font-size:46px;font-weight:900;color:var(--ink);background:#fff;border-radius:14px;width:70px;height:70px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .deckcard.rev{border-color:var(--red);}
  .deckcard.rev .bigarw{color:var(--red);}
  .deckcard .dlabel{font-size:11px;font-weight:800;color:#6b6555;text-align:center;line-height:1.25;}
</style>
</head>
<body>

<!-- ============ 홈 ============ -->
<div id="home" class="screen home">
  <div class="brand"><span class="cross">✚</span><span class="kr">스위스 사는 스미스씨</span></div>
  <div class="brand en">Mr. Smith Living in Swiss</div>
  <div class="tag">혀가 꼬이는 단어를 실수 없이 빨리 읽어라 · 2–6명</div>

  <div class="panel">
    <div class="plabel">플레이어 수</div>
    <div id="countRow" class="count-row"></div>
    <div class="plabel">이름 (시계방향 순서)</div>
    <div id="nameList"></div>
    <div class="plabel">종료 벌점 <span style="font-weight:400;color:#a89e88">· 누구든 이 점수 도달 시 게임 끝 (룰 기본 6)</span></div>
    <div class="stepper">
      <button onclick="setScore(-1)">−</button>
      <b id="scoreVal">6</b>
      <button onclick="setScore(1)">＋</button>
    </div>
    <div class="plabel">자리 배치 <span style="font-weight:400;color:#a89e88">· 실제 앉은 방향에 맞춰 회전</span></div>
    <div class="seatprev" id="seatPrev"></div>
    <button class="btn btn-sub" onclick="rotateHomeSeats()">↻ 자리 회전</button>
    <button class="btn btn-primary mt" onclick="startGame()">게임 시작</button>
    <button class="link" style="display:block;margin:8px auto 0" onclick="openEditor()">✎ 단어 카드 편집 (<span id="wcount">0</span>장)</button>
  </div>
  <div class="footer">Pass &amp; Play · 심판(오른쪽 사람)이 성공/실패를 눌러 진행</div>
</div>

<!-- ============ 단어 편집 ============ -->
<div id="editor" class="screen editor hidden">
  <h3 style="margin:4px 0 8px">단어 카드 편집</h3>
  <div class="hint" style="text-align:left">한 줄에 단어 하나. 실제 제품 카드 90장 단어를 붙여넣으면 됩니다.<br>화살표(읽는 방향)는 매 게임 무작위로 배정됩니다.</div>
  <textarea id="wordArea" spellcheck="false"></textarea>
  <div class="cnt"><span id="editCount">0</span>개 단어</div>
  <div class="row2">
    <button class="btn btn-sub" onclick="resetWords()">기본값 복원</button>
    <button class="btn btn-primary" onclick="saveWords()">저장</button>
  </div>
</div>

<!-- ============ 게임 ============ -->
<div id="game" class="screen hidden">
  <div class="gtopbar">
    <button class="minibtn" onclick="rotateSeats()">↻ 자리</button>
    <div class="gstatus" id="gstatus"></div>
    <button class="minibtn" onclick="confirmQuit()">나가기</button>
  </div>

  <div class="ptable">
    <div class="edge top" id="seat_top"></div>
    <div class="mid">
      <div class="edge left" id="seat_left"></div>
      <div class="boardwrap"><div class="board" id="board"></div></div>
      <div class="edge right" id="seat_right"></div>
    </div>
    <div class="edge bottom" id="seat_bottom"></div>
  </div>

  <div class="controls" id="controls"></div>
</div>

<!-- ============ 게임오버 ============ -->
<div id="over" class="screen over hidden">
  <div class="cup">🏆</div>
  <h2 id="overTitle">게임 종료</h2>
  <div class="rank" id="rank"></div>
  <div id="showdown"></div>
  <button class="btn btn-primary mt" style="max-width:420px" onclick="location.reload()">새 게임</button>
</div>

<div id="toastHost"></div>

<script src="words.js"></script>
<script>
/* =========================================================================
   스위스 사는 스미스씨 — Pass & Play 웹 구현
   룰 요약:
   - 각 카드 뒷면 화살표(좌/우)가 매 턴 읽는 방향을 정함 = 더미 맨 위 카드 화살표
   - 자기 차례: 펼쳐진 단어들을 화살표 순서대로 실수 없이 읽기 (심판이 판정)
   - 성공: 새 카드 1장 → 오른쪽 끝 추가 or 기존 카드 위에 덮기
   - 실패: 실패한 단어 카드(+아래 덮인 카드) 전부 내 앞에 뒷면으로 (카드 1장=벌점 1)
   - 특수: 단어없애기 / 두번말하기(×2, 2장이면 ×3) / 건너뛰기
   - 종료: 누군가 앞 카드 6장 이상 → 즉시 종료. 벌점 최소 승리
   ========================================================================= */

const LS_WORDS = 'msmith_words';
let S = null; // game state
let uid = 0;

/* ---------- 단어 목록 로드/저장 ---------- */
function getWords(){
  const saved = localStorage.getItem(LS_WORDS);
  if(saved){ try{ const a = JSON.parse(saved); if(Array.isArray(a)&&a.length) return a; }catch(e){} }
  return window.DEFAULT_WORDS.slice();
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function randArrow(){ return Math.random()<0.5?'left':'right'; }

/* ---------- 홈 렌더 ---------- */
let playerCount = 3;
let endScore = 6;
let homeSeatRot = 0;
function setScore(d){ endScore=Math.max(3,Math.min(20,endScore+d)); document.getElementById('scoreVal').textContent=endScore; }
function rotateHomeSeats(){ homeSeatRot=(homeSeatRot+1)%4; renderSeatPreview(); }
function renderSeatPreview(){
  const names=[...document.querySelectorAll('#nameList input')].map((el,i)=>el.value.trim()||`P${i+1}`);
  const base=seatsBase(names.length);
  const z={top:[],bottom:[],left:[],right:[]};
  names.forEach((nm,i)=>{ const c=PCOLORS[i%PCOLORS.length]; z[rotEdge(base[i],homeSeatRot)].push({nm,c}); });
  const chips=(arr,edge)=>arr.map(o=>`<span class="scChip e-${edge}" style="border-color:${o.c.b};color:${o.c.b};background:${o.c.bg}">${escapeHtml(o.nm)}</span>`).join('');
  document.getElementById('seatPrev').innerHTML=`
    <div class="scEdge scTop">${chips(z.top,'top')}</div>
    <div class="scMid">
      <div class="scEdge scLeft">${chips(z.left,'left')}</div>
      <div class="scTable">🃏</div>
      <div class="scEdge scRight">${chips(z.right,'right')}</div>
    </div>
    <div class="scEdge scBottom">${chips(z.bottom,'bottom')}</div>`;
}
function renderHome(){
  const cr = document.getElementById('countRow'); cr.innerHTML='';
  for(let n=2;n<=6;n++){
    const b=document.createElement('button'); b.textContent=n;
    if(n===playerCount) b.className='sel';
    b.onclick=()=>{ playerCount=n; renderHome(); };
    cr.appendChild(b);
  }
  const nl=document.getElementById('nameList');
  const prev={}; nl.querySelectorAll('input').forEach((el,i)=>prev[i]=el.value);
  nl.innerHTML='';
  for(let i=0;i<playerCount;i++){
    const inp=document.createElement('input');
    inp.className='name-in'; inp.type='text'; inp.maxLength=10;
    inp.placeholder=`플레이어 ${i+1}`;
    inp.value = prev[i]!==undefined?prev[i]:'';
    inp.oninput=renderSeatPreview;
    nl.appendChild(inp);
  }
  document.getElementById('wcount').textContent=getWords().length;
  renderSeatPreview();
}

/* ---------- 단어 편집 ---------- */
function openEditor(){
  document.getElementById('home').classList.add('hidden');
  const ed=document.getElementById('editor'); ed.classList.remove('hidden');
  const ta=document.getElementById('wordArea');
  ta.value=getWords().join('\n');
  updateEditCount();
  ta.oninput=updateEditCount;
}
function updateEditCount(){
  const arr=parseArea();
  document.getElementById('editCount').textContent=arr.length;
}
function parseArea(){
  return document.getElementById('wordArea').value.split('\n').map(s=>s.trim()).filter(Boolean);
}
function saveWords(){
  const arr=parseArea();
  if(arr.length<2){ alert('단어를 최소 2개 이상 입력하세요.'); return; }
  localStorage.setItem(LS_WORDS, JSON.stringify(arr));
  backHome();
}
function resetWords(){
  if(!confirm('기본 단어 목록으로 되돌릴까요?')) return;
  localStorage.removeItem(LS_WORDS);
  document.getElementById('wordArea').value=getWords().join('\n');
  updateEditCount();
}
function backHome(){
  document.getElementById('editor').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  renderHome();
}

/* ---------- 게임 시작 ---------- */
function startGame(){
  const names=[...document.querySelectorAll('#nameList input')].map((el,i)=>el.value.trim()||`P${i+1}`);
  const words=getWords();
  // 덱 구성: 단어 카드 + 특수 6장 (단어없애기·두번말하기·건너뛰기 각 2장)
  let deck=[];
  words.forEach(w=> deck.push({id:++uid,type:'word',word:w,arrow:randArrow()}));
  // 특수카드 5종 × 각 2장 = 10장
  const specials=['twice','twice','thrice','thrice','reverse','reverse','skip','skip','nominate','nominate'];
  specials.forEach(e=> deck.push({id:++uid,type:'special',effect:e,arrow:randArrow()}));
  shuffle(deck);

  // 시작 카드: 첫 단어 카드 1장 공개 (특수면 옆으로 뺐다가 되섞기)
  let aside=[], first=null;
  while(deck.length){ const c=deck.shift(); if(c.type==='word'){ first=c; break; } aside.push(c); }
  deck.push(...aside); shuffle(deck);

  S={
    endScore,
    baseSeats: seatsBase(names.length),
    seatRot: homeSeatRot,
    players: names.map(n=>({name:n, penalty:[]})),
    deck,
    board: first?[{cards:[first],repeat:1}]:[],
    current:0,
    skipNext:false,
    phase:'reading',       // reading | placing | fail | nominate
    pending:null,          // 성공 후 카드 놓기 대기 (left/right/cover)
    pendingRepeat:1,       // 보드 비었을 때 대기중인 두/세번읽기 목표값
    reverseCount:0,        // 거꾸로읽기 누적(홀수면 순서 반대)
    nomPending:false,      // 다음 차례에 지목하기 적용
    readerIdx:null,        // 이번 차례 대신 읽는 사람(지목)
    lastIdx: first?0:null, // 가장 마지막에 펼쳐진 카드 인덱스
  };
  document.getElementById('home').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  render();
}

/* ---------- 방향 계산 ---------- */
function currentArrow(){ return S.deck.length? S.deck[0].arrow : 'right'; }
// 화살표(더미 맨 위) 기준. 거꾸로읽기 누적이 홀수면 반대로.
function effRight(){ let r=currentArrow()==='right'; if(S.reverseCount%2===1) r=!r; return r; }
function readingOrder(){
  const idx=S.board.map((_,i)=>i);
  return effRight()? idx : idx.reverse();
}

/* ---------- 렌더 ---------- */
function render(){
  const right=effRight();
  const jIdx=(S.current+1)%S.players.length;
  const rev = S.reverseCount%2===1?' 🔄':'';
  let st=`<span class="a">${escapeHtml(S.players[S.current].name)}</span> 차례 · 심판 ${escapeHtml(S.players[jIdx].name)} · 방향 ${right?'→':'←'}${rev} · 더미 ${S.deck.length}`;
  if(S.readerIdx!=null && S.readerIdx!==S.current){
    st+=` · <span class="rd">👉 ${escapeHtml(S.players[S.readerIdx].name)} 대신읽기</span>`;
  }
  document.getElementById('gstatus').innerHTML = st;

  renderBoard();
  renderPlayers(jIdx);
  renderControls();
}

// 위/아래 두 벌로 찍으므로 각 벌이 절반 높이에 2줄로 들어가도록 크기 계산
function fitFont(w){
  const n=w.length;
  if(n<=4) return 32;
  if(n<=6) return 27;
  if(n<=8) return 23;
  if(n<=10) return 20;
  if(n<=12) return 18;
  if(n<=15) return 15.5;
  if(n<=18) return 13.5;
  return 12;
}

let placeTargets=[]; // 놓을 자리(번호) 매핑: {type:'left'|'right'|'cover', idx}

function makeCard(slot,i,ordMap){
  const top=slot.cards[slot.cards.length-1];
  const c=document.createElement('div'); c.className='wcard';
  const depth=slot.cards.length;
  // 뒤에 쌓인 카드(최대 3겹까지 시각화)
  for(let d=1; d<Math.min(depth,4); d++){ const u=document.createElement('div'); u.className='under u'+d; c.appendChild(u); }
  const ord=document.createElement('div'); ord.className='ord'; ord.textContent=ordMap[i]; c.appendChild(ord);
  if(slot.repeat>1){ const r=document.createElement('div'); r.className='rep'; r.textContent='×'+slot.repeat; c.appendChild(r); }
  const fs=fitFont(top.word)+'px';
  const w1=document.createElement('div'); w1.className='word flip'; w1.textContent=top.word; w1.style.fontSize=fs; c.appendChild(w1); // 맞은편용(180°)
  const w2=document.createElement('div'); w2.className='word'; w2.textContent=top.word; w2.style.fontSize=fs; c.appendChild(w2); // 이쪽용
  if(depth>1){ const st=document.createElement('div'); st.className='stack'; st.textContent='🗂 '+depth+'장'; c.appendChild(st); }
  return c;
}
function makeZone(side){
  const z=document.createElement('div'); z.className='dropzone';
  z.innerHTML=`<div class="plus">＋</div><div class="zl">${side==='left'?'왼쪽 끝':'오른쪽 끝'}</div>`;
  z.onclick=()=>place({type:side});
  return z;
}
// 놓을 자리 번호 뱃지 부착 + placeTargets 등록
function tagTarget(elm, target){
  placeTargets.push(target);
  const n=placeTargets.length;
  const b=document.createElement('div'); b.className='pnum'; b.textContent=n;
  elm.appendChild(b);
}

function deckEl(){
  const dk=document.createElement('div');
  dk.className='deckcard'+(S.reverseCount%2===1?' rev':'');
  dk.innerHTML=`<div class="bigarw">${effRight()?'→':'←'}</div><div class="dlabel">더미 ${S.deck.length}장<br>${effRight()?'왼→오':'오→왼'} 읽기</div>`;
  return dk;
}

function renderBoard(){
  const el=document.getElementById('board'); el.innerHTML=''; placeTargets=[]; el.className='board';
  el.appendChild(deckEl());               // 카드 옆(왼쪽)에 더미 + 방향 화살표
  const placing=S.phase==='placing';
  const order=readingOrder();
  const ordMap={}; order.forEach((bi,k)=>ordMap[bi]=k+1);

  if(S.board.length===0){
    if(placing){ const z=makeZone('right'); tagTarget(z,{type:'right'}); el.appendChild(z); }
    else { const ph=document.createElement('div'); ph.className='emptyhint'; ph.textContent='펼쳐진 카드 없음'; el.appendChild(ph); }
    return;
  }

  if(placing){ const zl=makeZone('left'); tagTarget(zl,{type:'left'}); el.appendChild(zl); }

  S.board.forEach((slot,i)=>{
    const c=makeCard(slot,i,ordMap);
    if(placing){
      c.classList.add('stackable');
      tagTarget(c,{type:'cover',idx:i});
      c.onclick=()=>place({type:'cover',idx:i});
    } else if(S.phase==='fail'){
      c.classList.add('selectable');
      c.onclick=()=>onCardPick(i);
    }
    el.appendChild(c);
  });

  if(placing){ const zr=makeZone('right'); tagTarget(zr,{type:'right'}); el.appendChild(zr); }
}

// 좌석 배치: 인원수별 기본 링(시계방향) + 자리 회전(rotEdge)
const CYC=['bottom','right','top','left'];
function seatsBase(n){
  const m={2:['bottom','top'],3:['bottom','right','top'],4:['bottom','right','top','left'],
           5:['bottom','right','top','top','left'],6:['bottom','right','right','top','left','left']};
  return m[n]||m[4];
}
function rotEdge(e,k){ return CYC[(CYC.indexOf(e)+k)%4]; }
function rotateSeats(){ if(!S) return; S.seatRot=(S.seatRot+1)%4; render(); }

// 플레이어별 고유 색 (테두리 / 배경틴트 / 이름색)
const PCOLORS=[
  {b:'#d52b1e',bg:'#fdeceb'}, {b:'#2f77c9',bg:'#eaf2fb'}, {b:'#2e9d5b',bg:'#eaf7ef'},
  {b:'#e0952f',bg:'#fdf3e3'}, {b:'#8b5cc9',bg:'#f3edfa'}, {b:'#159a9c',bg:'#e7f6f6'},
];

function renderPlayers(jIdx){
  ['top','bottom','left','right'].forEach(s=>document.getElementById('seat_'+s).innerHTML='');
  S.players.forEach((p,i)=>{
    const edge=rotEdge(S.baseSeats[i], S.seatRot);
    const col=PCOLORS[i%PCOLORS.length];
    const d=document.createElement('div'); d.className='pl';
    d.style.borderColor=col.b; d.style.background=col.bg;
    if(i===S.current) d.classList.add('cur');
    if(i===jIdx) d.classList.add('judge');
    let role;
    if(i===S.current) role='<div class="role c">차례</div>';
    else if(i===jIdx) role='<div class="role j">심판</div>';
    else role='<div class="role">&nbsp;</div>';
    const warn=p.penalty.length>=S.endScore-1;
    const pips=p.penalty.map(()=> '<div class="pip'+(warn?' warn':'')+'"></div>').join('');
    d.innerHTML=`<div class="nm" style="color:${col.b}">${escapeHtml(p.name)}</div>${role}
      <div class="pts">벌점 <b>${p.penalty.length}</b>/${S.endScore}</div>
      <div class="pips">${pips}</div>`;
    document.getElementById('seat_'+edge).appendChild(d);
  });
}

function renderControls(){
  const el=document.getElementById('controls');
  const cur=S.players[S.current].name;
  const jIdx=(S.current+1)%S.players.length;
  const judge=S.players[jIdx].name;

  const reader = (S.readerIdx!=null)? S.players[S.readerIdx].name : cur;   // 실제 읽는 사람
  const loser = (S.readerIdx!=null)? reader : cur;                         // 실패 시 벌점 대상

  if(S.phase==='nominate'){
    let btns='';
    S.players.forEach((p,i)=>{ if(i!==S.current) btns+=`<button class="btn btn-sub" style="margin-bottom:8px" onclick="chooseReader(${i})">${escapeHtml(p.name)}</button>`; });
    el.innerHTML=`<div class="hint">👉 <b>지목하기</b> — <b>${escapeHtml(cur)}</b>님, 이번 읽기를 <b>대신할 사람</b>을 고르세요.<br>그 사람이 읽고, 실패하면 그 사람이 벌점을 받습니다.</div>${btns}`;
  }
  else if(S.phase==='reading'){
    const dir = effRight()?'왼쪽 카드부터':'오른쪽 카드부터';
    const who = (S.readerIdx!=null)? `<b>${escapeHtml(reader)}</b>님(대신)이` : `<b>${escapeHtml(cur)}</b>님이`;
    el.innerHTML=`<div class="hint">${who} <b>${dir}</b> 순서대로 모두 읽습니다. (×2·×3 표시는 그만큼 반복!)<br><b>${escapeHtml(judge)}</b>님이 판정하세요.</div>
      <div class="row2">
        <button class="btn btn-ok" onclick="onSuccess()">✓ 성공 <span style="opacity:.7;font-size:13px">(Y)</span></button>
        <button class="btn btn-fail" onclick="onFail()">✕ 실패 <span style="opacity:.7;font-size:13px">(N)</span></button>
      </div>`;
  }
  else if(S.phase==='placing'){
    el.innerHTML=`<div class="hint">성공! 새 카드 놓을 <b>자리(점선)</b>를 탭하거나 <b>숫자키 1~${placeTargets.length}</b>.<br>카드 위 <b>＋겹쳐놓기</b>를 탭하면 그 위에 겹칩니다.</div>
      <button class="btn btn-sub" onclick="S.phase='reading';render()">← 취소</button>`;
  }
  else if(S.phase==='fail'){
    el.innerHTML=`<div class="hint"><b>읽기에 실패한 단어 카드</b>를 선택하세요.<br>그 카드(+아래 덮인 카드)가 <b>${escapeHtml(loser)}</b>님 앞으로 갑니다(벌점).</div>
      <button class="btn btn-sub" onclick="S.phase='reading';render()">← 뒤로</button>`;
  }
}

/* ---------- 액션: 성공 → 놓을 위치 선택 ---------- */
function onSuccess(){ S.phase='placing'; render(); }

// 놓을 자리 확정 (드롭존 클릭 / 카드 겹치기 클릭 / 숫자키 공통)
function place(target){
  S.pending=(target.type==='cover')?{type:'cover',idx:target.idx}:{type:target.type};
  S.phase='reading';
  continueDraw();
}

/* ---------- 액션: 실패 ---------- */
function onFail(){
  if(S.board.length===0){ endTurn(); return; }
  S.phase='fail'; render();
}

/* ---------- 카드 선택 (fail 시 실패한 단어) ---------- */
function onCardPick(i){
  if(S.phase==='fail'){ takeStackAsPenalty(i); }
}

/* ---------- 지목하기: 대신 읽을 사람 선택 ---------- */
function chooseReader(idx){ S.readerIdx=idx; S.phase='reading'; render(); }

/* 실패: 선택한 스택 전부 벌점으로 (지목받아 대신 읽은 경우 그 사람이 벌점) */
function takeStackAsPenalty(i){
  const slot=S.board[i];
  const loser = (S.readerIdx!=null)? S.readerIdx : S.current;
  const cur=S.players[loser];
  slot.cards.forEach(c=> cur.penalty.push(c));
  S.board.splice(i,1);
  fixLastIdx();
  // 종료 체크
  if(cur.penalty.length>=S.endScore){ gameOver(); return; }
  // Note: 실패 시 새 카드 안 펼침. 단, 펼쳐진 카드가 0장이면 새로 1장 펼침
  if(S.board.length===0){
    S.pending={type:'right', silent:true};
    S.phase='reading';
    continueDraw(true); // afterFail=true → 턴 넘김
    return;
  }
  endTurn();
}

/* ---------- 카드 뽑기 (특수 처리 포함) ----------
   성공 시 pending(right/cover) 대로 단어 1장을 놓을 때까지 특수카드를 처리.
   afterFail: 실패 후 보드가 비어 자동으로 1장 펼치는 경우 (턴은 끝남) */
function continueDraw(afterFail){
  while(true){
    if(S.deck.length===0){ finishPlacement(null, afterFail); return; }
    const card=S.deck.shift();
    if(card.type==='word'){ finishPlacement(card, afterFail); return; }
    // 특수카드 — 즉시 처리 후 계속 뽑기
    if(card.effect==='skip'){
      S.skipNext=true; toast('skip');
      // 건너뛰기 = 이 성공의 새 카드를 '놓지 않고' 턴 종료. (실패 후 빈 보드 보충 중엔 계속 진행)
      if(!afterFail){ S.pending=null; endTurn(); return; }
    }
    else if(card.effect==='twice'){ applyRepeat(2); toast('twice'); }
    else if(card.effect==='thrice'){ applyRepeat(3); toast('thrice'); }
    else if(card.effect==='reverse'){ S.reverseCount++; toast('reverse'); }
    else if(card.effect==='nominate'){ S.nomPending=true; toast('nominate'); }
  }
}

// 가장 최근 단어의 반복 횟수를 val 이상으로 (두번=2, 세번=3)
function applyRepeat(val){
  if(S.board.length===0){ S.pendingRepeat=Math.max(S.pendingRepeat,val); return; }
  const idx = (S.lastIdx!=null && S.board[S.lastIdx])? S.lastIdx : S.board.length-1;
  S.board[idx].repeat=Math.max(S.board[idx].repeat, val);
}

function finishPlacement(card, afterFail){
  if(card){
    let idx;
    if(S.pending && S.pending.type==='cover' && S.board[S.pending.idx]){
      S.board[S.pending.idx].cards.push(card); idx=S.pending.idx;
    } else if(S.pending && S.pending.type==='left'){
      S.board.unshift({cards:[card],repeat:1}); idx=0;
    } else {
      S.board.push({cards:[card],repeat:1}); idx=S.board.length-1;
    }
    S.lastIdx=idx;
    // 보드 비었을 때 대기중이던 두/세번읽기 적용
    if(S.pendingRepeat>1){ S.board[idx].repeat=Math.max(S.board[idx].repeat,S.pendingRepeat); S.pendingRepeat=1; }
  }
  S.pending=null;
  endTurn();
}

/* ---------- 턴 종료/전환 ---------- */
function endTurn(){
  let n=S.players.length;
  let next=(S.current+1)%n;
  if(S.skipNext){ S.skipNext=false; const skipped=S.players[next].name; next=(next+1)%n; toast('skipped',false,skipped); }
  S.current=next;
  S.readerIdx=null;                                           // 지난 차례 지목 해제
  if(S.nomPending){ S.nomPending=false; S.phase='nominate'; } // 이번 차례에 지목 적용
  else S.phase='reading';
  render();
}

function fixLastIdx(){
  if(S.board.length===0){ S.lastIdx=null; }
  else if(S.lastIdx==null||S.lastIdx>=S.board.length){ S.lastIdx=S.board.length-1; }
}

/* ---------- 특수카드 토스트 ---------- */
const SPECIAL_INFO={
  twice:{ico:'🗣',tt:'두 번 읽기',ds:'가장 최근 단어를 두 번 읽어야 합니다.'},
  thrice:{ico:'🗣🗣',tt:'세 번 읽기',ds:'가장 최근 단어를 세 번 읽어야 합니다.'},
  reverse:{ico:'🔄',tt:'거꾸로 읽기',ds:'이제부터 카드 읽는 순서가 반대가 됩니다!'},
  skip:{ico:'⏭',tt:'건너뛰기',ds:'다음 플레이어 차례를 건너뜁니다.'},
  nominate:{ico:'👉',tt:'지목하기',ds:'다음 차례에 대신 읽을 사람을 지목합니다.'},
  skipped:{ico:'⏭',tt:'건너뜀!',ds:'차례를 건너뛰었습니다.'},
};
function toast(kind, empty, name){
  const info=SPECIAL_INFO[kind]; if(!info) return;
  const host=document.getElementById('toastHost');
  const t=document.createElement('div'); t.className='special-toast';
  let ds=info.ds;
  if(kind==='skipped'&&name) ds=`${name}님의 차례를 건너뛰었습니다.`;
  const head = kind==='skipped'?'' : '특수카드 · ';
  t.innerHTML=`<div class="ico">${info.ico}</div><div class="tt">${head}${info.tt}</div><div class="ds">${escapeHtml(ds)}</div>`;
  host.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, 1600);
}

/* ---------- 게임 종료 ---------- */
function gameOver(){
  document.getElementById('game').classList.add('hidden');
  const ov=document.getElementById('over'); ov.classList.remove('hidden');
  const ranked=S.players.map((p,i)=>({...p,i,score:p.penalty.length})).sort((a,b)=>a.score-b.score);
  const min=ranked[0].score;
  const winners=ranked.filter(p=>p.score===min);

  const rk=document.getElementById('rank'); rk.innerHTML='';
  ranked.forEach((p,pos)=>{
    const d=document.createElement('div'); d.className='r'+(p.score===min?' win':'');
    d.innerHTML=`<div class="pos">${p.score===min?'👑':(pos+1)}</div>
      <div class="nm">${escapeHtml(p.name)}</div>
      <div class="sc">벌점 ${p.score}</div>`;
    rk.appendChild(d);
  });

  const sd=document.getElementById('showdown');
  if(winners.length>1){
    document.getElementById('overTitle').textContent='최종 대결 필요!';
    const worst=ranked[ranked.length-1];
    sd.innerHTML=`벌점 최소 <b>${winners.map(w=>escapeHtml(w.name)).join(', ')}</b>님이 동점입니다.<br><br>
      🎤 <b>최종 대결</b>: 벌점이 가장 많은 <b>${escapeHtml(worst.name)}</b>님(심판) 앞의 카드를 모두 나열하고, 동점자들이 돌아가며 읽습니다. <b>가장 적은 시도로 실수 없이</b> 읽은 사람이 최종 승자! (또 동점이면 공동 우승)`;
    sd.classList.remove('hidden');
  } else {
    document.getElementById('overTitle').textContent=`🏆 ${winners[0].name} 승리!`;
    sd.classList.add('hidden'); sd.innerHTML='';
  }
}

function confirmQuit(){ if(confirm('게임을 나가고 처음으로 돌아갈까요?')) location.reload(); }

/* ---------- 단축키 ---------- */
document.addEventListener('keydown',e=>{
  if(!S) return;
  if(S.phase==='placing'){
    const n=parseInt(e.key,10);
    if(!isNaN(n) && n>=1 && n<=placeTargets.length){ place(placeTargets[n-1]); e.preventDefault(); }
  } else if(S.phase==='reading'){
    if(e.key==='Enter' || e.key.toLowerCase()==='y'){ onSuccess(); e.preventDefault(); }   // 성공
    else if(e.key.toLowerCase()==='n' || e.key==='Backspace'){ onFail(); e.preventDefault(); } // 실패
  }
});

/* ---------- util ---------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

renderHome();
</script>
